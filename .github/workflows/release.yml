name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set version from tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "Building version: ${GITHUB_REF#refs/tags/}"

      - name: Build and push console image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/krkn-chaos/krkn-operator-console:${{ env.VERSION }}
            quay.io/krkn-chaos/krkn-operator-console:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find previous tag (if any)
          PREV_TAG=$(git describe --tags --abbrev=0 $VERSION^ 2>/dev/null || echo "")

          # Build gh release command
          if [ -n "$PREV_TAG" ]; then
            echo "Generating notes from $PREV_TAG to $VERSION"
            gh release create $VERSION \
              --title "Release $VERSION" \
              --generate-notes \
              --notes-start-tag "$PREV_TAG"
          else
            echo "First release - generating notes from all commits"
            gh release create $VERSION \
              --title "Release $VERSION" \
              --generate-notes
          fi
