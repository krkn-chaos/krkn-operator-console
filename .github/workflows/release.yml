name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set version from tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "Building version: ${GITHUB_REF#refs/tags/}"

      - name: Build and push console image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/krkn-chaos/krkn-operator-console:${{ env.VERSION }}
            quay.io/krkn-chaos/krkn-operator-console:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat <<EOF > release-notes.md
          ## Container Images

          Multi-architecture images (linux/amd64, linux/arm64):

          - \`quay.io/krkn-chaos/krkn-operator-console:$VERSION\`
          - \`quay.io/krkn-chaos/krkn-operator-console:latest\`

          ## Installation

          \`\`\`bash
          # Using Helm (recommended)
          helm install krkn-operator oci://quay.io/krkn-chaos/charts/krkn-operator \\
            --set console.enabled=true \\
            --version $VERSION

          # Using kubectl
          kubectl apply -f https://raw.githubusercontent.com/krkn-chaos/krkn-operator-console/$VERSION/deployment/kubernetes/console.yaml
          \`\`\`

          **Note**: Container images are automatically built for both AMD64 and ARM64 architectures.
          Docker/Podman will automatically pull the correct image for your system architecture.
          EOF

          gh release create $VERSION --title "Release $VERSION" --notes-file release-notes.md
