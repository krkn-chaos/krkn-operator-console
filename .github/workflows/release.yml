name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set version from tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "Building version: ${GITHUB_REF#refs/tags/}"

      - name: Build and push console image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/krkn-chaos/krkn-operator-console:${{ env.VERSION }}
            quay.io/krkn-chaos/krkn-operator-console:latest

      - name: Generate Release Notes
        id: generate
        continue-on-error: true
        run: |
          python3 scripts/generate-release-notes.py \
            --version $VERSION \
            --repo-url https://github.com/krkn-operator-ecosystem/krkn-operator-console \
            --docs-url https://krkn-chaos.dev/docs/krkn-operator/ \
            > release-notes.md

      - name: Fallback Release Notes
        if: steps.generate.outcome == 'failure'
        run: |
          echo "## Release $VERSION" > release-notes.md
          echo "" >> release-notes.md
          echo "See commit history for changes." >> release-notes.md
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "" >> release-notes.md
          echo "**Documentation**: https://krkn-chaos.dev/docs/krkn-operator/" >> release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $VERSION --title "Release $VERSION" --notes-file release-notes.md
